apiVersion: apps/v1
kind: Deployment
metadata:
  name: jd-explorer
  namespace: jd-explorer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jd-explorer
  template:
    metadata:
      labels:
        app: jd-explorer
    spec:
      containers:
        - name: jd-explorer
          image: ghcr.io/leayeh/jd-explorer:sha-67c4d9ca714f2cad72db407df119eca9e4bceb5b
          ports:
            - containerPort: 8000
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jd-explorer-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
