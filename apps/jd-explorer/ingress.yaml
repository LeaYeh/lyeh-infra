---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jd-explorer
  namespace: jd-explorer
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
    - hosts:
        - jd.lyeh.dev
      secretName: jd-lyeh-dev-tls
  rules:
    - host: jd.lyeh.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jd-explorer
                port:
                  number: 80
