apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.0/manifests/install.yaml
patches:
  # Run in HTTP mode; Traefik terminates TLS at the ingress layer
  # Must include binary name because args overrides Docker CMD (tini execs it directly)
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args
        value: ["argocd-server", "--insecure"]
    target:
      kind: Deployment
      name: argocd-server

  # CX23 resource limits: argocd-server (user-facing API + UI)
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-server
      spec:
        template:
          spec:
            containers:
              - name: argocd-server
                resources:
                  requests:
                    cpu: "50m"
                    memory: "128Mi"
                  limits:
                    cpu: "200m"
                    memory: "256Mi"

  # CX23 resource limits: argocd-repo-server (git clone/diff, can spike)
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-repo-server
      spec:
        template:
          spec:
            containers:
              - name: argocd-repo-server
                resources:
                  requests:
                    cpu: "50m"
                    memory: "128Mi"
                  limits:
                    cpu: "200m"
                    memory: "256Mi"

  # CX23 resource limits: argocd-application-controller (reconciliation loop)
  - patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: argocd-application-controller
      spec:
        template:
          spec:
            containers:
              - name: argocd-application-controller
                resources:
                  requests:
                    cpu: "100m"
                    memory: "128Mi"
                  limits:
                    cpu: "500m"
                    memory: "256Mi"
